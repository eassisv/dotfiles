# ==========================
# Core & Provided Configs
# ==========================
set -g mouse on
set -g focus-events on

unbind C-p
bind f run "tmux neww ~/.local/bin/tmux-sessionizer"
bind p run "tmux neww ~/.local/bin/tmux-sessionizer -f ~/agent-workspace/"

bind r source ~/.tmux.conf

bind -r ] next-window
bind -r [ previous-window

# Unbind the default 's' key
# unbind s

# Bind 's' to open a floating popup and run the 'ts' function from your zshrc
# bind s display-popup -w 70% -h 70% -E "zsh -ic 'ts'"

# Reload tmux config and display a message
bind r source-file ~/.tmux.conf \; display-message " tmux.conf reloaded!"
# ==========================
# Status Bar Customization
# ==========================

# 1. Right side: Full session name (#S), remove date/time. 
# Set length to 100 to prevent long session names from being abbreviated/truncated.
set -g status-right-length 100
set -g status-right "[#S] " # Added brackets for visual consistency, adjust if you just want "#S"

# 2. Left side: Clear default session text so windows sit on the far left edge.
set -g status-left ""

# Align the window list to the left
set -g status-justify left

# 3. Window formats: Active window gets [brackets], inactive gets spacing for balance.
set -g window-status-format " #I:#W "
set -g window-status-current-format "[#I:#W]"


# ==========================
# Custom Aliases Binds
# ==========================
# Binding 'prefix + a' for tmuxai and 'prefix + o' for tmuxopen.
# We use 'zsh -ic' to load your aliases from .zshrc before executing.
bind a run-shell "zsh -ic 'tmuxai'"
bind o run-shell "zsh -ic 'tmuxopen'"


# ==========================
# Suggested Improvements
# ==========================

# Start windows and panes at 1, not 0. (Easier to reach on the keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Fix the Esc key delay. (Highly recommended if you use Vim/Neovim)
set -sg escape-time 10

# Increase scrollback buffer size from the default 2000 to 50000.
set -g history-limit 50000

# Upgrade terminal colors (Ensures themes in Neovim/scripts look correct)
set -g default-terminal "screen-256color"
